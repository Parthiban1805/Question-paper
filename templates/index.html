<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Paper Generator</title>
    <!-- Include Lucide Icons -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.js"></script>
    <style>
        /* Custom Properties */
       /* Modern CSS Reset */
*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

/* Custom Properties with Modern Color System */
:root {
    /* Colors */
    --primary-50: #e8f5e9;
    --primary-100: #c8e6c9;
    --primary-200: #a5d6a7;
    --primary-300: #81c784;
    --primary-400: #66bb6a;
    --primary-500: #4caf50;
    --primary-600: #43a047;
    --primary-700: #388e3c;
    --primary-800: #2e7d32;
    --primary-900: #1b5e20;
    
    /* Neutral Colors */
    --gray-50: #fafafa;
    --gray-100: #f5f5f5;
    --gray-200: #eeeeee;
    --gray-300: #e0e0e0;
    --gray-400: #bdbdbd;
    --gray-500: #9e9e9e;
    --gray-600: #757575;
    --gray-700: #616161;
    --gray-800: #424242;
    --gray-900: #212121;
    
    /* Semantic Colors */
    --success: #2e7d32;
    --error: #d32f2f;
    --warning: #ed6c02;
    --info: #0288d1;
    
    /* Elevation */
    --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
    
    /* Animation */
    --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-normal: 300ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-slow: 500ms cubic-bezier(0.4, 0, 0.2, 1);
    
    /* Layout */
    --container-padding: clamp(1rem, 5vw, 2rem);
    --header-height: 4rem;
    --border-radius: 0.5rem;
}

/* Base Styles */
body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    line-height: 1.5;
    color: var(--gray-900);
    background-color: var(--gray-50);
    min-height: 100vh;
}

/* Layout Components */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: var(--header-height);
    background-color: white;
    box-shadow: var(--shadow-sm);
    padding: 0 var(--container-padding);
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 50;
}

.main-container {
    padding-top: calc(var(--header-height) + 2rem);
    padding-inline: var(--container-padding);
    max-width: 1200px;
    margin: 0 auto;
    min-height: 100vh;
}

/* Navigation Components */
.nav-brand {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    text-decoration: none;
    color: var(--primary-600);
    font-weight: 600;
    font-size: 1.25rem;
    transition: var(--transition-fast);
}

.nav-brand:hover {
    color: var(--primary-700);
}

.logout-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    border-radius: var(--border-radius);
    background-color: var(--primary-500);
    color: white;
    text-decoration: none;
    font-weight: 500;
    transition: var(--transition-fast);
}

.logout-btn:hover {
    background-color: var(--primary-600);
}

/* Card Component */
.upload-card {
    background-color: white;
    border-radius: var(--border-radius);
    box-shadow: var(--shadow-md);
    padding: 2rem;
    max-width: 32rem;
    margin: 0 auto;
    transition: var(--transition-normal);
}

.upload-card:hover {
    box-shadow: var(--shadow-lg);
}

/* Form Components */
.form-inputs {
    display: grid;
    gap: 1.5rem;
    margin-bottom: 2rem;
}

.input-group {
    display: grid;
    gap: 0.5rem;
}

.form-input {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid var(--gray-300);
    border-radius: var(--border-radius);
    background-color: white;
    transition: var(--transition-fast);
}

.form-input:hover {
    border-color: var(--gray-400);
}

.form-input:focus {
    outline: none;
    border-color: var(--primary-500);
    box-shadow: 0 0 0 3px var(--primary-100);
}

/* File Upload Area */
.file-upload {
    border: 2px dashed var(--gray-300);
    border-radius: var(--border-radius);
    padding: 2rem;
    text-align: center;
    cursor: pointer;
    transition: var(--transition-fast);
}

.file-upload:hover, .file-upload.highlight {
    border-color: var(--primary-500);
    background-color: var(--primary-50);
}

.file-upload input[type="file"] {
    display: none;
}

/* Submit Button */
.submit-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    width: 100%;
    padding: 0.75rem 1.5rem;
    background-color: var(--primary-500);
    color: white;
    border: none;
    border-radius: var(--border-radius);
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition-fast);
}

.submit-btn:hover {
    background-color: var(--primary-600);
}

.submit-btn:active {
    background-color: var(--primary-700);
}

/* Status Indicators */
.loading, .success-checkmark {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 1rem;
}

.loading {
    color: var(--primary-500);
}

.success-checkmark {
    color: var(--success);
}

/* Animations */
@keyframes spin {
    to { transform: rotate(360deg); }
}

.loading-spinner {
    animation: spin 1s linear infinite;
}

/* Responsive Design */
@media (max-width: 640px) {
    .upload-card {
        padding: 1.5rem;
    }
    
    .file-upload {
        padding: 1.5rem;
    }
    
    .nav-brand span {
        display: none;
    }
}

@media (max-width: 480px) {
    .logout-btn span {
        display: none;
    }
    
    .logout-btn {
        padding: 0.5rem;
    }
}
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <i data-lucide="file-question"></i>
            QP Generator
        </a>
        <a href="/logout" class="logout-btn">
            <i data-lucide="log-out"></i>
            Logout
        </a>
    </nav>

    <!-- Main Content -->
    <div class="main-container">
        <div class="upload-card">
            <i data-lucide="upload-cloud" class="upload-icon"></i>
            <h1 class="upload-title">Upload Course Material</h1>
            
            <form id="upload-form" action="/upload" method="POST" enctype="multipart/form-data">
                <div class="form-inputs">
                    <div class="input-group">
                        <label for="subject-name">Subject Name:</label>
                        <input type="text" id="subject-name" name="subject-name" required class="form-input">
                    </div>
                    <div class="input-group">
                        <label for="course-code">Course Code:</label>
                        <input type="text" id="course-code" name="course-code" required class="form-input">
                    </div>
                    <div class="input-group">
                        <label for="exam-time">Exam Duration (hours):</label>
                        <input type="text" id="exam-time" name="exam-time"  required class="form-input">
                    </div>
                    <div class="input-group">
                        <label for="total-marks">Total Marks:</label>
                        <input type="number" id="total-marks" name="total-marks" required class="form-input">
                    </div>
                    <div class="input-group">
                        <label for="semester">Semester:</label>
                        <select id="semester" name="semester" required class="form-input">
                            <option value="">Select Semester</option>
                            <option value="I">I</option>
                            <option value="II">II</option>
                            <option value="III">III</option>
                            <option value="IV">IV</option>
                            <option value="V">V</option>
                            <option value="VI">VI</option>
                            <option value="VII">VII</option>
                            <option value="VIII">VIII</option>
                        </select>
                    </div>
                </div>

                <div class="file-upload">
                    <label class="file-upload-label">
                        <input type="file" name="file" accept=".docx" required>
                        <i data-lucide="file-plus"></i>
                        <span class="upload-text">Choose a .docx file or drag it here</span>
                    </label>
                </div>
                <div class="file-name"></div>
                <button type="submit" class="submit-btn">
                    <i data-lucide="send"></i>
                    Generate Questions
                </button>
            </form>

            <div class="loading">
                <i data-lucide="loader" class="loading-spinner"></i>
                Processing your document...
            </div>
            <div class="success-checkmark">
                <i data-lucide="check-circle"></i>
                Successfully generated!
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // File upload handling
        const fileInput = document.querySelector('input[type="file"]');
        const fileNameDisplay = document.querySelector('.file-name');
        const uploadForm = document.getElementById('upload-form');
        const loadingIndicator = document.querySelector('.loading');
        const successCheckmark = document.querySelector('.success-checkmark');

        fileInput.addEventListener('change', (e) => {
            const fileName = e.target.files[0]?.name;
            if (fileName) {
                fileNameDisplay.textContent = `Selected file: ${fileName}`;
                fileNameDisplay.style.display = 'block';
            }
        });

        // Drag and drop functionality
        const dropZone = document.querySelector('.file-upload');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, unhighlight, false);
        });

        function highlight(e) {
            dropZone.classList.add('highlight');
        }

        function unhighlight(e) {
            dropZone.classList.remove('highlight');
        }

        dropZone.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            fileInput.files = files;
            
            if (files[0]) {
                fileNameDisplay.textContent = `Selected file: ${files[0].name}`;
                fileNameDisplay.style.display = 'block';
            }
        }

        // Form submission handling
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loadingIndicator.style.display = 'block';

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('subject-name', document.getElementById('subject-name').value);
            formData.append('course-code', document.getElementById('course-code').value);
            formData.append('exam-time', document.getElementById('exam-time').value);
            formData.append('total-marks', document.getElementById('total-marks').value);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const result = await response.text();
                    document.open();
                    document.write(result);
                    document.close();
                } else {
                    const error = await response.json();
                    alert(error.error || 'An error occurred during upload');
                }
            } catch (error) {
                alert('An error occurred during upload');
            } finally {
                loadingIndicator.style.display = 'none';
            }
        });
    </script>
</body>
</html>
